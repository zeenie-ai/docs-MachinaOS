<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1020" width="100%" preserveAspectRatio="xMidYMid meet" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arr-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#06b6d4"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
    <style>
      .bg { fill: #fafafa; }
      .header-text { fill: #111827; font-size: 22px; font-weight: 700; }
      .header-sub { fill: #6b7280; font-size: 14px; }

      .row-card { fill: #ffffff; stroke-width: 2; rx: 14; }
      .row-1 { stroke: #8b5cf6; }
      .row-2 { stroke: #06b6d4; }
      .row-3 { stroke: #10b981; }

      .num-bg-1 { fill: #8b5cf6; }
      .num-bg-2 { fill: #06b6d4; }
      .num-bg-3 { fill: #10b981; }
      .num-txt { fill: #ffffff; font-size: 15px; font-weight: 700; }

      .row-title { fill: #111827; font-size: 18px; font-weight: 700; }
      .row-tag { fill: #6b7280; font-size: 12px; font-style: italic; }
      .row-desc { fill: #4b5563; font-size: 13px; }
      .row-use { fill: #1f2937; font-size: 13px; font-weight: 600; }

      .node-box { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; rx: 8; }
      .node-trigger { fill: #fef3c7; stroke: #f59e0b; }
      .node-agent-1 { fill: #ede9fe; stroke: #8b5cf6; stroke-width: 2.5; }
      .node-agent-2 { fill: #cffafe; stroke: #06b6d4; stroke-width: 2.5; }
      .node-agent-3 { fill: #d1fae5; stroke: #10b981; stroke-width: 2.5; }
      .node-helper { fill: #f3f4f6; stroke: #9ca3af; }
      .node-tool { fill: #f9fafb; stroke: #d1d5db; }
      .node-output { fill: #e0f2fe; stroke: #0284c7; }

      .node-txt { fill: #111827; font-size: 12px; font-weight: 600; }
      .node-sub { fill: #6b7280; font-size: 10px; }

      .conn { stroke: #9ca3af; stroke-width: 2; fill: none; stroke-linecap: round; }
      .conn-dotted { stroke: #9ca3af; stroke-width: 1.5; fill: none; stroke-dasharray: 3,3; }
      .conn-delegate { stroke: #06b6d4; stroke-width: 2; fill: none; stroke-linecap: round; }
      .conn-flow-1 { stroke: #8b5cf6; stroke-width: 2; fill: none; stroke-linecap: round; }
      .conn-flow-2 { stroke: #06b6d4; stroke-width: 2; fill: none; stroke-linecap: round; }
      .conn-flow-3 { stroke: #10b981; stroke-width: 2; fill: none; stroke-linecap: round; }

      .label-italic { fill: #6b7280; font-size: 10px; font-style: italic; }
    </style>
  </defs>

  <rect width="1100" height="1020" class="bg"/>

  <!-- Header -->
  <text x="550" y="40" text-anchor="middle" class="header-text">Three Workflows You Get on Day One</text>
  <text x="550" y="62" text-anchor="middle" class="header-sub">Open OpenCompany for the first time and these are already loaded. Each shows a different pattern you can copy.</text>

  <!-- ============================================================ -->
  <!-- WORKFLOW 1: AI ASSISTANT -->
  <!-- ============================================================ -->
  <rect x="30" y="90" width="1040" height="240" class="row-card row-1"/>
  <circle cx="58" cy="118" r="14" class="num-bg-1"/>
  <text x="58" y="123" text-anchor="middle" class="num-txt">1</text>
  <text x="84" y="118" class="row-title">AI Assistant</text>
  <text x="84" y="135" class="row-tag">16 nodes · one smart agent with a full toolbox</text>

  <!-- Triggers (left) -->
  <rect x="50" y="180" width="120" height="38" class="node-box node-trigger" rx="8"/>
  <text x="110" y="198" text-anchor="middle" class="node-txt">💬 Chat</text>
  <text x="110" y="212" text-anchor="middle" class="node-sub">in-app panel</text>

  <rect x="50" y="232" width="120" height="38" class="node-box node-trigger" rx="8"/>
  <text x="110" y="250" text-anchor="middle" class="node-txt">📱 Telegram</text>
  <text x="110" y="264" text-anchor="middle" class="node-sub">incoming message</text>

  <!-- AI Agent center -->
  <rect x="280" y="195" width="160" height="60" class="node-box node-agent-1" rx="10"/>
  <text x="360" y="220" text-anchor="middle" class="node-txt" style="font-size: 14px;">🤖 AI Agent</text>
  <text x="360" y="240" text-anchor="middle" class="node-sub">thinks, decides, acts</text>

  <!-- Arrows in -->
  <path d="M 175 199 L 280 215" class="conn-flow-1" marker-end="url(#arr-purple)"/>
  <path d="M 175 251 L 280 235" class="conn-flow-1" marker-end="url(#arr-purple)"/>

  <!-- Memory + Skills attached below -->
  <rect x="220" y="280" width="100" height="32" class="node-box node-helper" rx="6"/>
  <text x="270" y="299" text-anchor="middle" class="node-txt">🧠 Memory</text>

  <rect x="330" y="280" width="100" height="32" class="node-box node-helper" rx="6"/>
  <text x="380" y="299" text-anchor="middle" class="node-txt">📚 Skills</text>

  <path d="M 320 255 L 270 280" class="conn-dotted"/>
  <path d="M 400 255 L 380 280" class="conn-dotted"/>

  <!-- Tools cluster (right of agent) -->
  <rect x="490" y="170" width="280" height="120" class="node-box" rx="10" style="fill: #fafafa; stroke: #d1d5db;"/>
  <text x="630" y="190" text-anchor="middle" class="node-txt" style="fill: #6b7280;">🔧 Toolbox</text>

  <rect x="500" y="200" width="84" height="22" class="node-tool" rx="5"/>
  <text x="542" y="215" text-anchor="middle" class="node-sub">🔍 Web search</text>

  <rect x="592" y="200" width="84" height="22" class="node-tool" rx="5"/>
  <text x="634" y="215" text-anchor="middle" class="node-sub">🌐 Browser</text>

  <rect x="684" y="200" width="84" height="22" class="node-tool" rx="5"/>
  <text x="726" y="215" text-anchor="middle" class="node-sub">📄 Files</text>

  <rect x="500" y="228" width="84" height="22" class="node-tool" rx="5"/>
  <text x="542" y="243" text-anchor="middle" class="node-sub">💻 Shell</text>

  <rect x="592" y="228" width="84" height="22" class="node-tool" rx="5"/>
  <text x="634" y="243" text-anchor="middle" class="node-sub">🐍 Python</text>

  <rect x="684" y="228" width="84" height="22" class="node-tool" rx="5"/>
  <text x="726" y="243" text-anchor="middle" class="node-sub">⚙ Processes</text>

  <rect x="546" y="256" width="84" height="22" class="node-tool" rx="5"/>
  <text x="588" y="271" text-anchor="middle" class="node-sub">📋 Todos</text>

  <rect x="638" y="256" width="84" height="22" class="node-tool" rx="5"/>
  <text x="680" y="271" text-anchor="middle" class="node-sub">+ more</text>

  <path d="M 440 225 L 490 225" class="conn-flow-1" marker-end="url(#arr-purple)"/>

  <!-- Outputs (right) -->
  <rect x="830" y="180" width="180" height="38" class="node-box node-output" rx="8"/>
  <text x="920" y="198" text-anchor="middle" class="node-txt">📤 Telegram Send</text>
  <text x="920" y="212" text-anchor="middle" class="node-sub">reply to user</text>

  <rect x="830" y="232" width="180" height="38" class="node-box node-output" rx="8"/>
  <text x="920" y="250" text-anchor="middle" class="node-txt">📝 Console</text>
  <text x="920" y="264" text-anchor="middle" class="node-sub">live log in UI</text>

  <path d="M 770 199 L 830 199" class="conn-flow-1" marker-end="url(#arr-purple)"/>
  <path d="M 770 251 L 830 251" class="conn-flow-1" marker-end="url(#arr-purple)"/>

  <!-- Use this when -->
  <text x="58" y="313" class="row-use">USE WHEN:</text>
  <text x="155" y="313" class="row-desc">You want one AI that can browse the web, run code on your machine, and chat over Telegram.</text>

  <!-- ============================================================ -->
  <!-- WORKFLOW 2: AI EMPLOYEE -->
  <!-- ============================================================ -->
  <rect x="30" y="355" width="1040" height="340" class="row-card row-2"/>
  <circle cx="58" cy="383" r="14" class="num-bg-2"/>
  <text x="58" y="388" text-anchor="middle" class="num-txt">2</text>
  <text x="84" y="383" class="row-title">AI Employee</text>
  <text x="84" y="400" class="row-tag">58 nodes · a team lead that delegates to 5 specialists</text>

  <!-- Triggers (left) -->
  <rect x="50" y="450" width="120" height="38" class="node-box node-trigger" rx="8"/>
  <text x="110" y="468" text-anchor="middle" class="node-txt">💬 Chat</text>
  <text x="110" y="482" text-anchor="middle" class="node-sub">in-app panel</text>

  <rect x="50" y="500" width="120" height="38" class="node-box node-trigger" rx="8"/>
  <text x="110" y="518" text-anchor="middle" class="node-txt">📱 Telegram</text>
  <text x="110" y="532" text-anchor="middle" class="node-sub">incoming message</text>

  <!-- Zeenie team lead -->
  <rect x="240" y="465" width="170" height="62" class="node-box node-agent-2" rx="10"/>
  <text x="325" y="490" text-anchor="middle" class="node-txt" style="font-size: 14px;">👔 Zeenie</text>
  <text x="325" y="510" text-anchor="middle" class="node-sub">team lead — decides</text>
  <text x="325" y="522" text-anchor="middle" class="node-sub">who handles what</text>

  <path d="M 175 469 L 240 487" class="conn-flow-2" marker-end="url(#arr-cyan)"/>
  <path d="M 175 519 L 240 505" class="conn-flow-2" marker-end="url(#arr-cyan)"/>

  <!-- Zeenie's own Memory + Skills -->
  <rect x="245" y="545" width="78" height="26" class="node-box node-helper" rx="5"/>
  <text x="284" y="562" text-anchor="middle" class="node-sub">🧠 Memory</text>

  <rect x="327" y="545" width="78" height="26" class="node-box node-helper" rx="5"/>
  <text x="366" y="562" text-anchor="middle" class="node-sub">📚 Skills</text>

  <path d="M 290 527 L 284 545" class="conn-dotted"/>
  <path d="M 360 527 L 366 545" class="conn-dotted"/>

  <!-- Delegation arrow to specialists -->
  <text x="465" y="497" class="label-italic">delegates to →</text>

  <!-- Five specialists in a column -->
  <rect x="555" y="395" width="220" height="48" class="node-box node-agent-2" rx="8"/>
  <text x="665" y="414" text-anchor="middle" class="node-txt">💻 Coding Agent</text>
  <text x="665" y="430" text-anchor="middle" class="node-sub">files · shell · Python · processes</text>

  <rect x="555" y="450" width="220" height="48" class="node-box node-agent-2" rx="8"/>
  <text x="665" y="469" text-anchor="middle" class="node-txt">📧 Productivity Agent</text>
  <text x="665" y="485" text-anchor="middle" class="node-sub">Gmail · Calendar · Drive · Sheets</text>

  <rect x="555" y="505" width="220" height="48" class="node-box node-agent-2" rx="8"/>
  <text x="665" y="524" text-anchor="middle" class="node-txt">🗺 Travel Agent</text>
  <text x="665" y="540" text-anchor="middle" class="node-sub">Maps · geocoding · nearby places</text>

  <rect x="555" y="560" width="220" height="48" class="node-box node-agent-2" rx="8"/>
  <text x="665" y="579" text-anchor="middle" class="node-txt">🌐 Web Agent</text>
  <text x="665" y="595" text-anchor="middle" class="node-sub">browser · HTTP · web search</text>

  <rect x="555" y="615" width="220" height="48" class="node-box node-agent-2" rx="8"/>
  <text x="665" y="634" text-anchor="middle" class="node-txt">💬 Social Agent</text>
  <text x="665" y="650" text-anchor="middle" class="node-sub">Twitter · WhatsApp</text>

  <!-- Delegate connections -->
  <path d="M 410 480 Q 480 480 480 419 L 555 419" class="conn-delegate" marker-end="url(#arr-cyan)"/>
  <path d="M 410 490 Q 490 490 490 474 L 555 474" class="conn-delegate" marker-end="url(#arr-cyan)"/>
  <path d="M 410 500 L 555 529" class="conn-delegate" marker-end="url(#arr-cyan)"/>
  <path d="M 410 510 Q 490 510 490 584 L 555 584" class="conn-delegate" marker-end="url(#arr-cyan)"/>
  <path d="M 410 520 Q 480 520 480 639 L 555 639" class="conn-delegate" marker-end="url(#arr-cyan)"/>

  <!-- Note on isolation -->
  <text x="785" y="430" class="label-italic">each has its own</text>
  <text x="785" y="445" class="label-italic">memory · skills · tools</text>

  <!-- Outputs (right side) -->
  <rect x="830" y="540" width="180" height="38" class="node-box node-output" rx="8"/>
  <text x="920" y="558" text-anchor="middle" class="node-txt">📤 Telegram</text>
  <text x="920" y="572" text-anchor="middle" class="node-sub">reply to user</text>

  <rect x="830" y="585" width="180" height="38" class="node-box node-output" rx="8"/>
  <text x="920" y="603" text-anchor="middle" class="node-txt">📝 Console</text>
  <text x="920" y="617" text-anchor="middle" class="node-sub">per-agent logs</text>

  <!-- Use this when -->
  <text x="58" y="678" class="row-use">USE WHEN:</text>
  <text x="155" y="678" class="row-desc">You want one chat that handles everything — and each domain has a specialist that's actually good at it.</text>

  <!-- ============================================================ -->
  <!-- WORKFLOW 3: CLAUDE ASSISTANT -->
  <!-- ============================================================ -->
  <rect x="30" y="720" width="1040" height="240" class="row-card row-3"/>
  <circle cx="58" cy="748" r="14" class="num-bg-3"/>
  <text x="58" y="753" text-anchor="middle" class="num-txt">3</text>
  <text x="84" y="748" class="row-title">Claude Assistant</text>
  <text x="84" y="765" class="row-tag">15 nodes · Anthropic's Claude Code in a workflow, sessions persist across days</text>

  <!-- Triggers (left) -->
  <rect x="50" y="810" width="120" height="38" class="node-box node-trigger" rx="8"/>
  <text x="110" y="828" text-anchor="middle" class="node-txt">💬 Chat</text>
  <text x="110" y="842" text-anchor="middle" class="node-sub">in-app panel</text>

  <rect x="50" y="862" width="120" height="38" class="node-box node-trigger" rx="8"/>
  <text x="110" y="880" text-anchor="middle" class="node-txt">📱 Telegram</text>
  <text x="110" y="894" text-anchor="middle" class="node-sub">incoming message</text>

  <!-- Claude Code center -->
  <rect x="280" y="825" width="160" height="60" class="node-box node-agent-3" rx="10"/>
  <text x="360" y="850" text-anchor="middle" class="node-txt" style="font-size: 14px;">🧠 Claude Code</text>
  <text x="360" y="870" text-anchor="middle" class="node-sub">session-persistent CLI</text>

  <path d="M 175 829 L 280 845" class="conn-flow-3" marker-end="url(#arr-green)"/>
  <path d="M 175 881 L 280 865" class="conn-flow-3" marker-end="url(#arr-green)"/>

  <!-- Memory + Skills below -->
  <rect x="270" y="908" width="80" height="28" class="node-box node-helper" rx="5"/>
  <text x="310" y="926" text-anchor="middle" class="node-sub">🧠 Memory</text>

  <rect x="365" y="908" width="80" height="28" class="node-box node-helper" rx="5"/>
  <text x="405" y="926" text-anchor="middle" class="node-sub">📚 Skills</text>

  <path d="M 320 885 L 310 908" class="conn-dotted"/>
  <path d="M 400 885 L 405 908" class="conn-dotted"/>

  <!-- Tools cluster -->
  <rect x="490" y="800" width="280" height="120" class="node-box" rx="10" style="fill: #fafafa; stroke: #d1d5db;"/>
  <text x="630" y="820" text-anchor="middle" class="node-txt" style="fill: #6b7280;">🔧 Coding Toolbox</text>

  <rect x="500" y="830" width="84" height="22" class="node-tool" rx="5"/>
  <text x="542" y="845" text-anchor="middle" class="node-sub">📄 Files</text>

  <rect x="592" y="830" width="84" height="22" class="node-tool" rx="5"/>
  <text x="634" y="845" text-anchor="middle" class="node-sub">🔎 FS Search</text>

  <rect x="684" y="830" width="84" height="22" class="node-tool" rx="5"/>
  <text x="726" y="845" text-anchor="middle" class="node-sub">💻 Shell</text>

  <rect x="500" y="858" width="84" height="22" class="node-tool" rx="5"/>
  <text x="542" y="873" text-anchor="middle" class="node-sub">⚙ Processes</text>

  <rect x="592" y="858" width="84" height="22" class="node-tool" rx="5"/>
  <text x="634" y="873" text-anchor="middle" class="node-sub">🌐 Browser</text>

  <rect x="684" y="858" width="84" height="22" class="node-tool" rx="5"/>
  <text x="726" y="873" text-anchor="middle" class="node-sub">🔍 Search</text>

  <rect x="592" y="886" width="84" height="22" class="node-tool" rx="5"/>
  <text x="634" y="901" text-anchor="middle" class="node-sub">📋 Todos</text>

  <path d="M 440 855 L 490 855" class="conn-flow-3" marker-end="url(#arr-green)"/>

  <!-- Outputs -->
  <rect x="830" y="810" width="180" height="38" class="node-box node-output" rx="8"/>
  <text x="920" y="828" text-anchor="middle" class="node-txt">📤 Telegram Send</text>
  <text x="920" y="842" text-anchor="middle" class="node-sub">reply to user</text>

  <rect x="830" y="862" width="180" height="38" class="node-box node-output" rx="8"/>
  <text x="920" y="880" text-anchor="middle" class="node-txt">📝 Console</text>
  <text x="920" y="894" text-anchor="middle" class="node-sub">live log in UI</text>

  <path d="M 770 829 L 830 829" class="conn-flow-3" marker-end="url(#arr-green)"/>
  <path d="M 770 881 L 830 881" class="conn-flow-3" marker-end="url(#arr-green)"/>

  <!-- Use this when -->
  <text x="58" y="945" class="row-use">USE WHEN:</text>
  <text x="155" y="945" class="row-desc">Your AI needs to actually ship code — refactor, build features, debug — across sessions that persist.</text>

  <!-- Footer note -->
  <text x="550" y="995" text-anchor="middle" class="label-italic" style="font-size: 12px;">All three are real .json files in the /workflows folder. Open them in the canvas, edit anything, save as your own.</text>

</svg>
