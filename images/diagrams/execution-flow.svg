<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" preserveAspectRatio="xMidYMid meet" font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f8f8f2"/>
    </marker>
    <style>
      .bg { fill: #282a36; }
      .entry { fill: #44475a; stroke: #8be9fd; stroke-width: 2.5; }
      .decision { fill: #44475a; stroke: #bd93f9; stroke-width: 2.5; }
      .path-temporal { fill: #44475a; stroke: #50fa7b; stroke-width: 2; }
      .path-redis { fill: #44475a; stroke: #8be9fd; stroke-width: 2; }
      .path-seq { fill: #44475a; stroke: #ffb86c; stroke-width: 2; }
      .shared { fill: #44475a; stroke: #f1fa8c; stroke-width: 2.5; }
      .output { fill: #44475a; stroke: #ff79c6; stroke-width: 2.5; }
      .title { fill: #f8f8f2; font-size: 16px; font-weight: 700; }
      .big { fill: #f8f8f2; font-size: 18px; font-weight: 700; }
      .sub { fill: #f8f8f2; font-size: 12px; }
      .mode-label { fill: #f8f8f2; font-size: 14px; font-weight: 700; }
      .conn { stroke: #f8f8f2; stroke-width: 1.8; fill: none; }
      .conn-yes { stroke: #50fa7b; stroke-width: 1.8; fill: none; }
      .conn-no { stroke: #ff79c6; stroke-width: 1.8; fill: none; }
      .branch-label { fill: #f1fa8c; font-size: 12px; font-style: italic; font-weight: 700; }
      .caption { fill: #6272a4; font-size: 11px; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="800"/>

  <!-- Entry node -->
  <rect class="entry" x="460" y="30" width="280" height="60" rx="8"/>
  <text x="600" y="58" class="title" text-anchor="middle">workflow.execute()</text>
  <text x="600" y="78" class="sub" text-anchor="middle">(WorkflowService facade)</text>

  <!-- Arrow to first decision -->
  <path class="conn" d="M 600 90 L 600 135" marker-end="url(#arrow)"/>

  <!-- First decision: Temporal? -->
  <polygon class="decision" points="600,140 780,210 600,280 420,210"/>
  <text x="600" y="200" class="big" text-anchor="middle">TEMPORAL_ENABLED</text>
  <text x="600" y="225" class="big" text-anchor="middle">and reachable?</text>

  <!-- Branch yes to Temporal path -->
  <path class="conn-yes" d="M 780 210 L 950 210 L 950 320" marker-end="url(#arrow)"/>
  <text x="830" y="200" class="branch-label">yes</text>

  <!-- Branch no to second decision -->
  <path class="conn-no" d="M 420 210 L 260 210 L 260 280" marker-end="url(#arrow)"/>
  <text x="325" y="200" class="branch-label">no</text>

  <!-- Second decision: Redis? -->
  <polygon class="decision" points="260,285 430,350 260,415 90,350"/>
  <text x="260" y="345" class="big" text-anchor="middle">Redis</text>
  <text x="260" y="370" class="big" text-anchor="middle">available?</text>

  <!-- Branch yes from second decision -->
  <path class="conn-yes" d="M 430 350 L 600 350 L 600 320" marker-end="url(#arrow)"/>
  <text x="475" y="340" class="branch-label">yes</text>

  <!-- Branch no from second decision -->
  <path class="conn-no" d="M 260 415 L 260 445" marker-end="url(#arrow)"/>
  <text x="200" y="440" class="branch-label">no</text>

  <!-- Three execution mode boxes -->
  <!-- Temporal Distributed (right) -->
  <rect class="path-temporal" x="820" y="320" width="260" height="150" rx="8"/>
  <text x="950" y="348" class="mode-label" text-anchor="middle">Temporal Distributed</text>
  <text x="950" y="372" class="sub" text-anchor="middle">per-node activities</text>
  <text x="950" y="392" class="sub" text-anchor="middle">3 retries, 10 min timeout</text>
  <text x="950" y="412" class="sub" text-anchor="middle">horizontal scaling</text>
  <text x="950" y="432" class="sub" text-anchor="middle">FIRST_COMPLETED scheduling</text>
  <text x="950" y="458" class="caption" text-anchor="middle">services/temporal/</text>

  <!-- Parallel Local Redis (center) -->
  <rect class="path-redis" x="470" y="320" width="260" height="150" rx="8"/>
  <text x="600" y="348" class="mode-label" text-anchor="middle">Parallel Local (Redis)</text>
  <text x="600" y="372" class="sub" text-anchor="middle">decide loop + Kahn layers</text>
  <text x="600" y="392" class="sub" text-anchor="middle">asyncio.gather() fork/join</text>
  <text x="600" y="412" class="sub" text-anchor="middle">Prefect-style input hash cache</text>
  <text x="600" y="432" class="sub" text-anchor="middle">DLQ + heartbeat recovery</text>
  <text x="600" y="458" class="caption" text-anchor="middle">services/execution/</text>

  <!-- Sequential fallback (left) -->
  <rect class="path-seq" x="120" y="445" width="280" height="120" rx="8"/>
  <text x="260" y="473" class="mode-label" text-anchor="middle">Sequential Fallback</text>
  <text x="260" y="497" class="sub" text-anchor="middle">simple topological walk</text>
  <text x="260" y="517" class="sub" text-anchor="middle">no cache, no retry, no DLQ</text>
  <text x="260" y="537" class="sub" text-anchor="middle">minimal environments only</text>
  <text x="260" y="558" class="caption" text-anchor="middle">_execute_sequential()</text>

  <!-- Converge arrows to shared node executor box -->
  <path class="conn" d="M 950 470 L 950 590 L 600 590" marker-end="url(#arrow)"/>
  <path class="conn" d="M 600 470 L 600 590" marker-end="url(#arrow)"/>
  <path class="conn" d="M 260 565 L 260 590 L 600 590" marker-end="url(#arrow)"/>

  <!-- Shared node handler box -->
  <rect class="shared" x="330" y="595" width="540" height="90" rx="8"/>
  <text x="600" y="625" class="title" text-anchor="middle">NodeExecutor.execute()</text>
  <text x="600" y="648" class="sub" text-anchor="middle">registry dispatch: {node_type: handler via functools.partial}</text>
  <text x="600" y="668" class="sub" text-anchor="middle">handlers/*.py -&gt; result dict -&gt; ExecutionContext</text>

  <!-- Arrow down to status broadcast -->
  <path class="conn" d="M 600 685 L 600 715" marker-end="url(#arrow)"/>

  <!-- Status broadcast -->
  <rect class="output" x="380" y="720" width="440" height="60" rx="8"/>
  <text x="600" y="745" class="title" text-anchor="middle">Status broadcast via StatusBroadcaster</text>
  <text x="600" y="765" class="sub" text-anchor="middle">node_status + node_output -&gt; Frontend WebSocket</text>
</svg>
